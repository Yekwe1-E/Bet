<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - BetNaija</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass-panel">
        <a href="index.html" class="brand">BetNaija</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="auth-container glass-panel">
        <h2 id="auth-title">Welcome Back</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;" id="auth-subtitle">Sign in to continue winning.</p>

        <div id="alert-box" class="alert" style="display: none;"></div>

        <form id="auth-form">
            <div id="register-fields" style="display: none;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="08012345678">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-btn">Sign In</button>
        </form>

        <p style="margin-top: 2rem; color: var(--text-secondary);">
            <span id="toggle-text">Don't have an account?</span> 
            <a href="#" id="toggle-auth" style="font-weight: 600;">Sign Up</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
