<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BetNaija</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card glass animate-fade">
        <center>
            <a href="index.html" class="brand" style="justify-content: center; margin-bottom: 2rem;">BetNaija</a>
        </center>
        <h2 style="text-align: center; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Enter your credentials to access your account</p>
        
        <div id="alert-container"></div>

        <form id="login-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-btn">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireGuest();
            
            const loginForm = document.getElementById('login-form');
            const alertContainer = document.getElementById('alert-container');
            const submitBtn = document.getElementById('submit-btn');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                submitBtn.disabled = true;
                submitBtn.innerText = 'Signing in...';
                alertContainer.innerHTML = '';

                try {
                    const response = await fetchAPI('/auth/login', 'POST', { email, password });
                    const data = response.data;
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('user', JSON.stringify({
                        id: data.id,
                        name: data.name,
                        email: data.email,
                        role: data.role
                    }));

                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    alertContainer.innerHTML = `<div class="badge badge-danger" style="width: 100%; text-align: center; padding: 0.75rem; margin-bottom: 1rem;">${error.message}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Sign In';
                }
            });
        });
    </script>
</body>
</html>
